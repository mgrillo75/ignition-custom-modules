    <filter id="modern-genset-panel-v8-corrected-rev2-accent-glow" x="-160%" y="-160%" width="420%" height="420%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#10b981" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#10b981" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#10b981" flood-opacity="0.4"/>
    </filter>
    <filter id="modern-genset-panel-v8-corrected-rev2-circle-glow" x="-160%" y="-160%" width="420%" height="420%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="1.6" flood-color="#10b981" flood-opacity="0.5"/>
