        <rect x="83" y="115" width="58" height="12" fill="#ffffff" fill-opacity="0.01" stroke="#f1f5f9" stroke-opacity="0.58"/>
        <rect x="83" y="131" width="58" height="12" fill="#ffffff" fill-opacity="0.01" stroke="#f1f5f9" stroke-opacity="0.58"/>
