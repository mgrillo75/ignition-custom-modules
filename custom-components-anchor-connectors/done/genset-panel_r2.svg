<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 648" width="440" height="648" role="img" aria-labelledby="modern-genset-panel-v8-corrected-rev2-title modern-genset-panel-v8-corrected-rev2-desc">
  <title id="modern-genset-panel-v8-corrected-rev2-title">Modern genset panel v8 corrected rev2</title>
  <desc id="modern-genset-panel-v8-corrected-rev2-desc">A grid-backed modern genset panel with upper breaker chain, generator symbol, and enlarged generator status card title.</desc>
  <defs>
    <radialGradient id="modern-genset-panel-v8-corrected-rev2-page" cx="50%" cy="0%" r="78%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="72%" stop-color="#050b14"/>
      <stop offset="100%" stop-color="#050b14"/>
    </radialGradient>
    <pattern id="modern-genset-panel-v8-corrected-rev2-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#94a3b8" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>
    <linearGradient id="modern-genset-panel-v8-corrected-rev2-shell" x1="107" y1="0" x2="107" y2="551.8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#0a101d" stop-opacity="0.98"/>
    </linearGradient>
    <radialGradient id="modern-genset-panel-v8-corrected-rev2-generator-fill" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="modern-genset-panel-v8-corrected-rev2-shell-shadow" x="-30%" y="-8%" width="160%" height="150%" color-interpolation-filters="sRGB">
