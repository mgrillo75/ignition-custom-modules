        <circle cx="17" cy="92" r="13" fill="#10b981" fill-opacity="0.02" stroke="#10b981" stroke-width="2"/>
        <circle cx="17" cy="102" r="13" fill="#10b981" fill-opacity="0.02" stroke="#10b981" stroke-width="2"/>
        <line x1="17" y1="115" x2="17" y2="136" stroke="#10b981" stroke-width="2" stroke-linecap="square" stroke-linejoin="round"/>
        <rect x="1" y="136" width="32" height="32" fill="#10b981" fill-opacity="0.02" stroke="#10b981" stroke-width="2"/>
