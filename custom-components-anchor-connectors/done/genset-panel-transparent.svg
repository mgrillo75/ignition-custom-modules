      <text x="17" y="34" fill="#f1f5f9" font-size="10.5" letter-spacing="0.02em" text-anchor="middle" dominant-baseline="middle">52I</text>
      <text x="17" y="152" fill="#f1f5f9" font-size="10.5" letter-spacing="0.02em" text-anchor="middle" dominant-baseline="middle">52G</text>
