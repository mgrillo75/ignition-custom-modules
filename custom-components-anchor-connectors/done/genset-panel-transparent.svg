<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 640" width="440" height="640" role="img" aria-labelledby="modern-genset-panel-v8-rev2-title modern-genset-panel-v8-rev2-desc">
  <title id="modern-genset-panel-v8-rev2-title">Modern genset panel v8 rev2</title>
  <desc id="modern-genset-panel-v8-rev2-desc">A modern genset panel with upper breaker chain, generator symbol, and generator status card on a transparent background.</desc>
  <defs>
    <radialGradient id="modern-genset-panel-v8-rev2-generator-fill" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="modern-genset-panel-v8-rev2-accent-glow" x="-120%" y="-120%" width="340%" height="340%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="5.5" flood-color="#10b981" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g transform="translate(113 47.6)" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
