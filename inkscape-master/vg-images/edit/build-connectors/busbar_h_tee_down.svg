<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="busGH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="busGV" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <filter id="busGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="s"/>
      <feMerge>
        <feMergeNode in="s"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="8" y="14" width="80" height="18" rx="4" ry="4" fill="url(#busGH)" filter="url(#busGlow)" stroke="#4ade80" stroke-width="0.5"/>
  <rect x="39" y="24" width="18" height="64" rx="4" ry="4" fill="url(#busGV)" filter="url(#busGlow)" stroke="#4ade80" stroke-width="0.5"/>
  <rect x="8" y="14" width="80" height="3" rx="1" ry="1" fill="white" opacity="0.12"/>
  <rect x="39" y="24" width="3" height="64" rx="1" ry="1" fill="white" opacity="0.12"/>
</svg>