  <path d="M249.5,1079.0 L260.5,1081.0" stroke="#49505a" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="671" cy="1080" r="10" fill="url(#screwGrad)" stroke="#7d8288" stroke-width="1"/>
  <path d="M665.5,1079.0 L676.5,1081.0" stroke="#49505a" stroke-width="1.5" stroke-linecap="round"/>


  <!-- Inner information fields -->
  <rect x="242" y="300" width="236" height="624" rx="4" fill="#f0f1ef" stroke="#c9cdd1" stroke-width="1"/>
  <rect x="516" y="300" width="198" height="624" rx="4" fill="#efefeb" stroke="#c9cdd1" stroke-width="1"/>

  <rect x="396" y="362" width="120" height="478" rx="16" fill="url(#switchSlot)" stroke="#c3c7c8" stroke-width="1.2"/>

  <!-- ON/OFF emboss -->
  <text x="432" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="37" fill="#d2d4d1" font-weight="700">UP</text>
  <text x="470" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#cfd2cf" font-weight="700">On</text>
  <text x="432" y="468" font-family="Segoe UI, Arial, sans-serif" font-size="37" fill="#d2d4d1" font-weight="700">DN</text>
  <text x="470" y="468" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#cfd2cf" font-weight="700">Off</text>

