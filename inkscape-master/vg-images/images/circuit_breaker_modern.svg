  <rect x="252" y="426" width="134" height="38" rx="3" fill="url(#redLabel)"/>
  <text x="319" y="452" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="800">VG 65k</text>

  <text x="264" y="510" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#111" font-weight="700">50 AMPS  3 POLES</text>
  <text x="264" y="536" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#202832">600 VAC - 250 VDC 40 C</text>
  <text x="264" y="560" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#202832">CAT. VG3050C</text>
  <text x="264" y="584" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#202832">STYLE 693C96G91</text>

  <text x="264" y="634" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#2f3843">Suitable for use on</text>
  <text x="264" y="654" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#2f3843">two 100% protected poles.</text>
  <text x="264" y="674" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#2f3843">Use in enclosure listed type 1.</text>

  <line x1="252" y1="704" x2="386" y2="704" stroke="#b6bcc2"/>
  <text x="264" y="730" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#48515b">Terminal Information</text>
  <text x="264" y="752" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2d3540">3/16 in  120 lb-in</text>
  <text x="264" y="772" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2d3540">5/16 in  275 lb-in</text>

  
  <text x="522" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3d4550">VG Interrupting Capacity</text>
  <text x="522" y="361" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3d4550">RMS Sym. Amperes</text>

  <line x1="520" y1="374" x2="706" y2="374" stroke="#b9c0c6"/>
  <text x="526" y="400" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#2a313b">240V  100k</text>
