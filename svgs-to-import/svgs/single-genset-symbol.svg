<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 168" width="144" height="168" role="img" aria-labelledby="single-genset-symbol-title single-genset-symbol-desc">
  <title id="single-genset-symbol-title">Single genset symbol</title>
  <desc id="single-genset-symbol-desc">A rounded slate panel containing a glowing emerald generator circle with an AC sine-wave coil, exported from the single-genset HTML symbol on a transparent background.</desc>
  <defs>
    <radialGradient id="single-genset-symbol-fill" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="single-genset-symbol-glow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="5.5" flood-color="#10b981" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="143" height="167" rx="8" fill="#0f172a" stroke="#1e293b"/>

  <g filter="url(#single-genset-symbol-glow)">
    <circle cx="72" cy="84" r="54" fill="url(#single-genset-symbol-fill)" stroke="#10b981" stroke-width="2"/>
  </g>

  <g transform="translate(52 74)" fill="none" aria-hidden="true">
    <path d="M4 10Q12 -2 20 10T36 10" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
