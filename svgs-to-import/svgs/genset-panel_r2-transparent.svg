<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 648" width="440" height="648" role="img" aria-labelledby="modern-genset-panel-v8-corrected-rev2-transparent-title modern-genset-panel-v8-corrected-rev2-transparent-desc">
  <title id="modern-genset-panel-v8-corrected-rev2-transparent-title">Modern genset panel v8 corrected rev2 transparent</title>
  <desc id="modern-genset-panel-v8-corrected-rev2-transparent-desc">A modern genset panel with upper breaker chain, generator symbol, and enlarged generator status card title on a transparent background.</desc>
  <defs>
