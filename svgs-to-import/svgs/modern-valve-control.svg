<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 153" width="144" height="153" role="img" aria-labelledby="modern-valve-control-title modern-valve-control-desc">
  <title id="modern-valve-control-title">Modern valve control symbol</title>
  <desc id="modern-valve-control-desc">A glowing emerald valve control centered inside a rounded slate panel.</desc>
  <defs>
    <radialGradient id="modern-valve-control-radial" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="modern-valve-control-glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#10b981" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5.5" flood-color="#10b981" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10.5" flood-color="#10b981" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="143" height="152" rx="8" fill="#0f172a" stroke="#1e293b"/>

  <g transform="translate(17 29)" filter="url(#modern-valve-control-glow)">
    <path fill="url(#modern-valve-control-radial)" d="M1,41 L55,67.5 L1,94 Z M109,41 L55,67.5 L109,94 Z"/>
    <path fill="none" stroke="#10b981" stroke-width="2" stroke-linejoin="miter" stroke-linecap="butt" d="M1,41 L55,67.5 L1,94 Z M109,41 L55,67.5 L109,94 Z"/>
    <path fill="none" stroke="#10b981" stroke-width="2" stroke-linejoin="miter" stroke-linecap="butt" d="M55,67.5 L55,25 M35,25 L75,25 A20 20 0 0 0 35 25 Z"/>
