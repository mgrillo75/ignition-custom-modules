<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 184 168" width="184" height="168" role="img" aria-labelledby="pump-title pump-desc">
  <title id="pump-title">Modern pump symbol</title>
  <desc id="pump-desc">A glowing emerald pump centered inside a rounded slate panel.</desc>
  <defs>
    <radialGradient id="pump-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="pump-glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#10b981" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5.5" flood-color="#10b981" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10.5" flood-color="#10b981" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="183" height="167" rx="8" fill="#0f172a" stroke="#1e293b"/>

  <g transform="translate(17 29)" filter="url(#pump-glow)">
    <path fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M 8,20 L 8,36 M 8,22 L 75,22 M 8,34 L 51,34 M 8,22 L 8,34"/>
    <circle cx="75" cy="52" r="30" fill="url(#pump-radial)"/>
    <path fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M 104.17,45 A 30 30 0 1 0 104.17,59"/>
    <path fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M 128,43 L 128,61 M 75,45 A 7 7 0 0 0 68,52 A 7 7 0 0 0 75,59 L 128,59 L 128,45 Z"/>
  </g>
</svg>
