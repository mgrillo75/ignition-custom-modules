name: build-all

on:
  push:
    branches: [ ignition-8.3 ]
  pull_request:
    branches: [ ignition-8.3 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Azul JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: maven

      - name: Make build script executable
        run: chmod +x build-all.sh

      - name: Run build-all.sh
        run: ./build-all.sh
